name: Release
run-name: ${{ github.ref_name }} release build 🚀

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-event:
    name: Check Release Tag ☑️
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    outputs:
      version: ${{ steps.check.outputs.version }}
      prerelease: ${{ steps.check.outputs.prerelease }}
      validTag: ${{ steps.check.outputs.validTag }}
    steps:
      - name: Check Tag ☑️
        id: check
        run: |
          : Check Release Tag
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi
          shopt -s extglob

          if [[ "${GITHUB_EVENT_NAME}" != 'push' ]]; then
            echo 'validTag=false' >> $GITHUB_OUTPUT
            exit 0
          fi

          tag="${GITHUB_REF_NAME#v}"
          case "${tag}" in
            +([0-9]).+([0-9]).+([0-9]) )
              echo 'validTag=true' >> $GITHUB_OUTPUT
              echo 'prerelease=false' >> $GITHUB_OUTPUT
              echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
              ;;
            +([0-9]).+([0-9]).+([0-9])-@(beta|rc|alpha)*([0-9.]) )
              echo 'validTag=true' >> $GITHUB_OUTPUT
              echo 'prerelease=true' >> $GITHUB_OUTPUT
              echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo 'validTag=false' >> $GITHUB_OUTPUT
              ;;
          esac

  build-windows:
    name: Build for Windows 🪟
    needs: check-event
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Inno Setup 🔧
        run: choco install innosetup --no-progress -y

      - name: Install Dependencies 📦
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,dev]"
          pip install pyinstaller

      - name: Build Installer 🧱
        run: python build.py --installer
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload Artifacts 📡
        uses: actions/upload-artifact@v4
        with:
          name: analyze-loudness-windows-x64
          path: |
            installer_output/*.exe
          if-no-files-found: error

  build-macos:
    name: Build for macOS 🍏
    needs: check-event
    runs-on: macos-15
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install create-dmg 🔧
        run: brew install create-dmg

      - name: Install Dependencies 📦
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,dev]"
          pip install pyinstaller

      - name: Generate .icns from iconset 🎨
        run: |
          if [ -d build_assets/icon.iconset ]; then
            iconutil -c icns build_assets/icon.iconset -o build_assets/icon.icns
          fi

      - name: Check Signing Secrets 🔑
        id: check-signing
        env:
          CERT: ${{ secrets.MACOS_SIGNING_CERT }}
        run: |
          if [[ -n "$CERT" ]]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::MACOS_SIGNING_CERT not set — building unsigned DMG"
          fi

      - name: Import Apple Developer ID Certificate 🔑
        if: steps.check-signing.outputs.signed == 'true'
        env:
          CERT_B64: ${{ secrets.MACOS_SIGNING_CERT }}
          CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo -n "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null

          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed -e 's/"//g')

          rm "$RUNNER_TEMP/cert.p12"

          echo '--- Signing identities ---'
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build .app Bundle 🧱
        run: python build.py
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Codesign .app 🔏
        if: steps.check-signing.outputs.signed == 'true'
        env:
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          APP="dist/Loudness Analyzer.app"
          IDENTITY=$(security find-identity -v -p codesigning | \
            grep "Developer ID Application" | head -1 | \
            sed -E 's/.*"([^"]+)".*/\1/')
          echo "Signing with identity: $IDENTITY"

          cat > /tmp/entitlements.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key><true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key><true/>
            <key>com.apple.security.cs.disable-library-validation</key><true/>
            <key>com.apple.security.cs.allow-dyld-environment-variables</key><true/>
          </dict>
          </plist>
          PLIST

          # Sign every Mach-O file inside the bundle (nested tools, dylibs, .so).
          # Entitlements are only for the main executable; nested binaries get
          # hardened runtime without the JIT / library-validation exceptions.
          find "$APP" -type f | while read -r f; do
            if file "$f" 2>/dev/null | grep -q "Mach-O"; then
              codesign --force --timestamp --options runtime \
                --sign "$IDENTITY" "$f"
            fi
          done

          # Main executable with entitlements
          codesign --force --timestamp --options runtime \
            --entitlements /tmp/entitlements.plist \
            --sign "$IDENTITY" "$APP/Contents/MacOS/analyze-loudness"

          # Finally the bundle itself
          codesign --force --timestamp --options runtime \
            --entitlements /tmp/entitlements.plist \
            --sign "$IDENTITY" "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Build DMG 💿
        run: python build.py --installer --skip-download --skip-build

      - name: Notarize DMG 📮
        if: steps.check-signing.outputs.signed == 'true'
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          set -e
          DMG=installer_output/Loudness-Analyzer.dmg

          SUBMIT_JSON=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --output-format json)
          echo "--- Submit response ---"
          echo "$SUBMIT_JSON"

          SUBMIT_ID=$(echo "$SUBMIT_JSON" | python3 -c "import json,sys;print(json.load(sys.stdin)['id'])")
          STATUS=$(echo "$SUBMIT_JSON" | python3 -c "import json,sys;print(json.load(sys.stdin)['status'])")

          echo "--- Notarization log ($SUBMIT_ID) ---"
          xcrun notarytool log "$SUBMIT_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" || true

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization status: $STATUS"
            exit 1
          fi

          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Upload Artifacts 📡
        uses: actions/upload-artifact@v4
        with:
          name: analyze-loudness-macos
          path: |
            installer_output/*.dmg
          if-no-files-found: error

  create-release:
    name: Create Release 🛫
    needs: [check-event, build-windows, build-macos]
    if: needs.check-event.outputs.validTag == 'true'
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Download Build Artifacts 📥
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release 🛫
        uses: softprops/action-gh-release@9d7c94cfd0a1f3ed45544c887983e9fa900f0564
        with:
          draft: true
          prerelease: ${{ needs.check-event.outputs.prerelease == 'true' }}
          tag_name: ${{ needs.check-event.outputs.version }}
          name: ${{ needs.check-event.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/*.exe
            artifacts/*.dmg
