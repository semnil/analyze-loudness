<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Frontend UI Tests — analyze-loudness</title>
  <style>
    body { font-family: monospace; background: #111; color: #ccc; padding: 16px; }
    .pass { color: #4c4; }
    .fail { color: #f44; font-weight: bold; }
    .suite { color: #8bf; margin-top: 12px; }
    #summary { margin-top: 16px; font-size: 1.2em; }
  </style>
</head>
<body>
  <!-- Minimal DOM matching index.html structure (required by main.js) -->
  <header>
    <h1>Loudness Analyzer (BS.1770 / EBU R128)</h1>
  </header>
  <main>
    <form id="analyze-form" class="input-bar" aria-label="Analyze audio source">
      <input id="url-input" type="url" placeholder="YouTube URL" required>
      <button id="submit-btn" type="submit">Analyze</button>
      <button id="load-btn" type="button">Load JSON</button>
    </form>
    <div id="status" role="status" aria-live="polite"></div>
    <div id="results" tabindex="-1"></div>
  </main>
  <div class="toolbar">
    <button id="lang-toggle" class="lang-toggle" type="button"></button>
    <button id="theme-toggle" class="theme-toggle" type="button"></button>
  </div>

  <div id="test-output"></div>
  <div id="summary"></div>

  <!-- Stub uPlot — chart rendering is not under test -->
  <script>
    window.uPlot = function() { this.destroy = function(){}; };
  </script>

  <!-- Stub chart renderers — return objects matching real API -->
  <script>
    window.renderTimeline = function(){ return { destroy: function(){}, ctx: null }; };
    window.renderHistogram = function(){};
    window.renderSegments = function(){};
    window.isDark = function(){
      return document.documentElement.getAttribute("data-theme") === "dark";
    };
    window.getTheme = function(){
      return {
        surface: "#fff", fg: "#333", fgMuted: "#666", titleColor: "#0d47a1",
        separator: "#ccc", barFill: "#9c27b0", accent: "#9c27b0",
        border: "#ccc",
      };
    };
  </script>

  <!-- Ensure deterministic language for assertions -->
  <script>
    try { localStorage.setItem("loudness-lang", "en"); } catch (_) {}
    try { localStorage.setItem("loudness-theme", "light"); } catch (_) {}
  </script>

  <!-- Load the actual frontend code -->
  <script src="../../frontend/i18n.js"></script>
  <script src="../../frontend/main.js"></script>

  <!-- Test runner -->
  <script src="test_ui.js"></script>
</body>
</html>
